<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad)" rx="120"/>
  
  <!-- MozhiSense Logo -->
  <text x="256" y="320" font-family="Baloo 2, sans-serif" font-size="220" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-5">
    MS
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="40" fill="white" opacity="0.3"/>
  <circle cx="450" cy="450" r="40" fill="white" opacity="0.2"/>
</svg>
