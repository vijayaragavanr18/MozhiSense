<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="url(#grad)" rx="45"/>
  
  <!-- MozhiSense Logo -->
  <text x="96" y="110" font-family="Baloo 2, sans-serif" font-size="80" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">
    MS
  </text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="15" fill="white" opacity="0.3"/>
  <circle cx="160" cy="160" r="15" fill="white" opacity="0.2"/>
</svg>
